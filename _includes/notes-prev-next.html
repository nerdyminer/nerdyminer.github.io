<div id="notes-prev-next" class="page-nav-links"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const notesOrder = [
    {
      section: "estructuras-lineales",
      items: [
        { title: "Espacios vectoriales", href: "/apuntes/estructuras-lineales/espacios-vectoriales/" },
        { title: "Bases y dimensión", href: "/apuntes/estructuras-lineales/bases-y-dimension/" },
        { title: "Transformaciones lineales", href: "/apuntes/estructuras-lineales/transformaciones-lineales/" },
        { title: "Producto interno", href: "/apuntes/estructuras-lineales/producto-interno/" },
        { title: "Determinantes y diagonalización", href: "/apuntes/estructuras-lineales/determinantes-y-diagonalizacion/" },
        { title: "Introducción a las formas", href: "/apuntes/estructuras-lineales/introduccion-a-las-formas/" },
        { title: "Descomposiciones matriciales", href: "/apuntes/estructuras-lineales/descomposiciones-matriciales/" }
      ]
    },
    {
      section: "calculo-incertidumbre-y-optimizacion",
      items: [
        { title: "Cálculo diferencial", href: "/apuntes/calculo-incertidumbre-y-optimizacion/calculo-diferencial/" },
        { title: "Aplicaciones del cálculo diferencial", href: "/apuntes/calculo-incertidumbre-y-optimizacion/aplicaciones-del-calculo-diferencial/" },
        { title: "Probabilidad elemental", href: "/apuntes/calculo-incertidumbre-y-optimizacion/probabilidad-clasica/" },
        { title: "Cálculo de probabilidades", href: "/apuntes/calculo-incertidumbre-y-optimizacion/introduccion-al-calculo-de-probabilidades/" },
        { title: "Distribuciones específicas de probabilidad", href: "/apuntes/calculo-incertidumbre-y-optimizacion/distribuciones-especificas-de-probabilidad/" },
        { title: "Introducción a la teoría de optimización", href: "/apuntes/calculo-incertidumbre-y-optimizacion/introduccion-a-la-teoria-de-optimizacion/" },
        { title: "Optimización de tipo \"black-box\"", href: "/apuntes/calculo-incertidumbre-y-optimizacion/optimizacion-de-tipo-black-box/" },
        { title: "Optimización aplicada al aprendizaje automático", href: "/apuntes/calculo-incertidumbre-y-optimizacion/optimizacion-aplicada-al-aprendizaje-automatico/" }
      ]
    },
    {
      section: "grafos-e-informacion",
      items: [
        { title: "Teoría de grafos", href: "/apuntes/grafos-e-informacion/teoria-de-grafos/" },
        { title: "Optimización de redes computacionales", href: "/apuntes/grafos-e-informacion/optimizacion-de-grafos/" },
        { title: "Introducción a la teoría de la información", href: "/apuntes/grafos-e-informacion/introduccion-a-la-teoria-de-la-informacion/" },
        { title: "Cadenas de Markov", href: "/apuntes/grafos-e-informacion/cadenas-de-markov/" }
      ]
    }
  ];

  function normalizePath(path) {
    if (!path.endsWith("/")) path += "/";
    path = path.replace(/index\.html\/?$/, "");
    return path;
  }

  const currentPath = normalizePath(window.location.pathname);
  const container = document.getElementById("notes-prev-next");

  let previous = null;
  let next = null;
  let found = false;

  for (const section of notesOrder) {
    const items = section.items;
    const index = items.findIndex(item => normalizePath(item.href) === currentPath);

    if (index !== -1) {
      found = true;
      if (index > 0) previous = items[index - 1];
      if (index < items.length - 1) next = items[index + 1];
      break;
    }
  }

  if (!found) {
    container.style.display = "none";
    return;
  }

  container.innerHTML = `
    <div class="page-nav-prev">
      ${previous ? `<a href="${previous.href}">← ${previous.title}</a>` : ``}
    </div>
    <div class="page-nav-next">
      ${next ? `<a href="${next.href}">${next.title} →</a>` : ``}
    </div>
  `;
});
</script>
