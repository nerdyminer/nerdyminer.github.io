project:
  type: website
  output-dir: docs

website:
  title: "NerdyMiner"
  navbar:
    logo: images/nerdyminer-icon.svg
    logo-alt: "NerdyMiner"
    left:
      - href: index.qmd
        text: Inicio
      - href: articulos/index.qmd
        text: Artículos
      - href: apuntes/index.qmd
        text: Apuntes
      - href: clases/index.qmd
        text: Clases
      - href: bibliografia.qmd
        text: Bibliografía
      - href: proyectos/index.qmd
        text: Proyectos
      - href: licencia.qmd
        text: Licencia
      - href: sobre-mi.qmd
        text: Sobre mí
  search: true
  page-footer:
    left: "© René Quezada"
    right: "Hecho con Quarto"

format:
  html:
    theme:
      - sandstone
      - styles-sandstone.scss
    toc: true
    toc-location: right
    smooth-scroll: true
    include-after-body: _includes/notes-prev-next.html

filters:
  - _extensions/custom/back-to-section.lua

crossref:
  chapters: true
  fig-title: Figura
  tbl-title: Tabla
  fig-prefix: Figura
  tbl-prefix: Tabla
  custom:
    - kind: float
      key: alg
      reference-prefix: Algoritmo
      caption-prefix: Algoritmo
      caption-location: bottom
