project:
  type: website
  output-dir: docs
  # Genera el orden anterior/siguiente de las entradas desde `number-offset`
  # antes de renderizar (ver scripts/build-notes-order.py).
  pre-render:
    - scripts/build-notes-order.py

website:
  title: "NerdyMiner"
  navbar:
    logo: images/nerdyminer-icon.svg
    logo-alt: "NerdyMiner"
    left:
      - href: index.qmd
        text: Inicio
      - href: articulos/index.qmd
        text: Artículos
      - href: apuntes/index.qmd
        text: Apuntes
      - href: clases/index.qmd
        text: Clases
      - href: bibliografia.qmd
        text: Bibliografía
      - href: proyectos/index.qmd
        text: Proyectos
      - href: licencia.qmd
        text: Licencia
      - href: sobre-mi.qmd
        text: Sobre mí
  search: true
  page-footer:
    left: "© René Quezada"
    right: "Hecho con Quarto"

format:
  html:
    # Sistema claro/oscuro: Litera (claro) + Slate (oscuro).
    # Quarto inyecta automáticamente el botón de alternancia en el navbar.
    # El tema anterior (sandstone + styles-sandstone.scss) se conserva en
    # disco como respaldo, fuera del build.
    theme:
      light:
        - litera
        - styles-litera.scss
      dark:
        - slate
        - styles-slate.scss
    toc: true
    toc-location: right
    smooth-scroll: true
    include-after-body: _includes/notes-prev-next.html

# Cachea la ejecución de los notebooks: sólo se re-ejecuta un documento si
# cambia su código/fuente. Los ajustes de estilo (SCSS) re-renderizan en
# segundos sin volver a correr Python.
execute:
  freeze: auto

filters:
  - _extensions/custom/back-to-section.lua

crossref:
  chapters: true
  fig-title: Figura
  tbl-title: Tabla
  fig-prefix: Figura
  tbl-prefix: Tabla
  custom:
    - kind: float
      key: alg
      reference-prefix: Algoritmo
      caption-prefix: Algoritmo
      caption-location: bottom
